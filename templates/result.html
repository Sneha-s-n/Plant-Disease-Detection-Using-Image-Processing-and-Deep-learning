<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Prediction Result</title>

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

    <style>

        body{

            background-image:
            linear-gradient(
                rgba(0,0,0,0.55),
                rgba(0,0,0,0.55)
            ),

            url('https://images.unsplash.com/photo-1515694346937-94d85e41e6f0');

            background-size: cover;

            background-position: center;

            background-repeat: no-repeat;

            background-attachment: fixed;

            min-height: 100vh;

            font-family: Arial, sans-serif;
        }

        .result-box{

            width: 70%;

            margin: auto;

            margin-top: 25px;

            margin-bottom: 25px;

            background-color: rgba(255,255,255,0.92);

            padding: 20px;

            border-radius: 15px;

            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        h1{

            text-align: center;

            margin-bottom: 25px;

            font-size: 30px;

            font-weight: bold;

            color: #222;
        }

        h3{

            text-align: center;

            margin-bottom: 10px;

            font-size: 18px;

            font-weight: bold;
        }

        img{

            width: 100%;

            height: 160px;

            object-fit: cover;

            border-radius: 10px;

            margin-bottom: 10px;

            border: 2px solid #ddd;
        }

        .result-text{

            font-size: 16px;

            padding: 10px;
        }

        .download-btn{

            text-align: center;

            margin-top: 15px;

            margin-bottom: 25px;
        }

        .btn-download{

            padding: 10px 25px;

            border: none;

            background-color: green;

            color: white;

            border-radius: 5px;

            font-size: 15px;
        }

        .btn-download:hover{

            background-color: darkgreen;
        }

        .navbar{

            border-radius: 0;
        }

        .navbar-brand{

            color: white !important;

            font-weight: bold;
        }

        .navbar-nav li a{

            color: white !important;
        }

        ul{

            padding-left: 18px;
        }

        li{

            margin-bottom: 5px;
        }

        hr{

            margin-top: 10px;

            margin-bottom: 10px;
        }

    </style>

</head>

<body>

<nav class="navbar navbar-inverse">

    <div class="container-fluid">

        <div class="navbar-header">

            <a class="navbar-brand">

                COFFEE PLANT LEAF DISEASE DETECTION SYSTEM

            </a>

        </div>

        <ul class="nav navbar-nav navbar-right">

    <li>

        <a href="/">Home</a>

    </li>

    <li>

        <a href="/graph">Graph</a>

    </li>

    <li>

        <a href="/logout">Logout</a>

    </li>

</ul>

    </div>

</nav>

<div class="container">

    <div class="result-box" id="content">

        <h1>

            Prediction Result

        </h1>

        <div class="row">

            <div class="col-md-4">

                <h3>Original</h3>

                <img src="{{ImageDisplay}}">

            </div>

            <div class="col-md-4">

                <h3>Gray</h3>

                <img src="{{ImageDisplay1}}">

            </div>

            <div class="col-md-4">

                <h3>Edge</h3>

                <img src="{{ImageDisplay2}}">

            </div>

        </div>

        <br>

        <div class="row">

            <div class="col-md-4">

                <h3>Threshold</h3>

                <img src="{{ImageDisplay3}}">

            </div>

            <div class="col-md-4">

                <h3>Sharpen</h3>

                <img src="{{ImageDisplay4}}">

            </div>

            <div class="col-md-4 result-text">

                <h3>Disease Result</h3>

                <hr>

                <p>

                    <b>Disease:</b>

                    {{status}}

                </p>

                <p>

                    <b>Accuracy:</b>

                    {{accuracy}}%

                </p>

                <h4>

                    Remedies

                </h4>

                <ul>

                    {% for item in Remedies1 %}

                    <li>

                        {{item}}

                    </li>

                    {% endfor %}

                </ul>

            </div>

        </div>

    </div>

    <div class="download-btn">

        <button class="btn-download"
                id="download-pdf">

            Download PDF

        </button>

    </div>

</div>

<script>

    document.getElementById('download-pdf')

    .addEventListener('click', function () {

        const element = document.getElementById('content');

        html2pdf()

            .from(element)

            .set({

                filename: 'plant_disease_report.pdf',

                margin: 10,

                html2canvas: {

                    scale: 2
                },

                jsPDF: {

                    unit: 'mm',

                    format: 'a4',

                    orientation: 'portrait'
                }

            })

            .save();
    });

</script>

</body>
</html>
